name: Sentinel CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Run Build, Logic and Tests
      run: |
        echo "Kompilerer Java fra src/..."
        javac src/ModelExtractor.java src/ModelTest.java
        
        echo "Kjører hovedlogikk..."
        java -cp src ModelExtractor
        
        echo "Kjører valideringstest..."
        java -cp src ModelTest
        
        echo "Kjører rapportgenerering fra scripts/..."
        node scripts/report_generator.js

    - name: Upload Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pipeline-report
        path: app/output/