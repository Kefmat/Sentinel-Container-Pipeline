name: Sentinel CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    # Sett arbeidskatalog til app-mappen der koden ligger
    defaults:
      run:
        working-directory: ./app
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Run Build, Logic and Tests
      run: |
        echo "Kompilerer Java-kildekode..."
        javac ModelExtractor.java ModelTest.java
        
        echo "Kjører hovedlogikk..."
        java ModelExtractor
        
        echo "Kjører valideringstest..."
        java ModelTest
        
        echo "Kjører rapportgenerering..."
        node report_generator.js