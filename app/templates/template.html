<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Sentinel Report</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card {{statusClass}}">
        <h1>Sentinel Pipeline Resultat</h1>
        
        <div class="stat-row">
            <span class="label">Systemstatus:</span>
            <span class="value {{statusClass}}">{{status}}</span>
        </div>
        
        <div class="stat-row">
            <span class="label">Noder Skannet:</span>
            <span class="value">{{nodes}}</span>
        </div>
        
        <div class="stat-row">
            <span class="label">Sikkerhetsscore:</span>
            <span class="value {{statusClass}}">{{score}}%</span>
        </div>

        <div class="footer">
            Generert av Sentinel Pipeline v1.0 <br>
            {{timestamp}}
        </div>
    </div>
</body>
</html>
